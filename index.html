<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Geometry Dash</title>
  
  <!-- Das lädt die Engine -->
  <script src="https://turbowarp.org"></script>

  <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
    #app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
    #loading { z-index: 1; }
    .progress-bar { border: 1px solid #fff; width: 200px; height: 10px; }
    #progress-fill { background: #fff; width: 0%; height: 100%; }
  </style>
</head>
<body>

  <div id="app"></div>

  <div id="loading" class="screen">
    <div style="margin-bottom: 10px;">Geometry Dash wird geladen...</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
  </div>

  <script>
    const scaffolding = new Scaffolding.Runtime();
    scaffolding.setupTarget(document.getElementById('app'));
    
    // Fortschrittsanzeige
    scaffolding.addEventListener('loadprogress', (p) => {
      document.getElementById('progress-fill').style.width = (p * 100) + '%';
    });

    // Automatischer Start nach Laden
    scaffolding.addEventListener('load', () => {
      document.getElementById('loading').style.display = 'none';
      scaffolding.start();
    });

    // Lade die project.json Datei direkt über den Scaffolding-Loader
    // Das ist sicherer als ein manueller 'fetch'
    scaffolding.loadProjectFromURL('project.json');
  </script>

</body>
</html>
