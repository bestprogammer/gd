<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:">
  <title>Geometry Dash</title>
  
  <!-- Das fixierte Script für die Engine -->
  <script src="https://turbowarp.org"></script>

  <style>
    body {
      color: #ffffff;
      font-family: sans-serif;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    :root, body.is-fullscreen {
      background-color: #000000;
    }
    [hidden] {
      display: none !important;
    }
    h1 {
      font-weight: normal;
    }
    a {
      color: inherit;
      text-decoration: underline;
      cursor: pointer;
    }

    #app, #loading, #error, #launch {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      background-color: #000000;
    }
    #launch {
      background-color: rgba(0, 0, 0, 0.7);
      cursor: pointer;
    }
    .green-flag {
      width: 80px;
      height: 80px;
      padding: 16px;
      border-radius: 100%;
      background: rgba(255, 255, 255, 0.75);
      border: 3px solid hsla(0, 100%, 100%, 1);
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }
    .progress-bar-outer {
      border: 1px solid currentColor;
      height: 10px;
      width: 200px;
      max-width: 200px;
    }
    .progress-bar-inner {
      height: 100%;
      width: 0;
      background-color: currentColor;
    }
    .loading-text {
      font-weight: normal;
      font-size: 36px;
      margin: 0 0 16px;
    }
    #error-message, #error-stack {
      font-family: monospace;
      max-width: 600px;
      white-space: pre-wrap;
      user-select: text;
      -webkit-user-select: text;
    }
  </style>
  <meta name="theme-color" content="#000000">
</head>
<body>

  <div id="app"></div>

  <div id="loading" class="screen">
    <noscript>Bitte aktiviere JavaScript</noscript>
    <div class="loading-text">Loading...</div>
    <div class="progress-bar-outer">
      <div id="progress-bar-inner" class="progress-bar-inner"></div>
    </div>
  </div>

  <div id="launch" class="screen" hidden>
    <div class="green-flag">
      <svg viewBox="0 0 48 48" fill="green" width="48" height="48"><path d="M12 8l26 16-26 16z"></path></svg>
    </div>
  </div>

  <div id="error" class="screen" hidden>
    <h1>Ein Fehler ist aufgetreten</h1>
    <div id="error-message"></div>
  </div>

  <script>
    const scaffolding = new Scaffolding.Runtime();
    scaffolding.setupTarget(document.getElementById('app'));
    
    const loadingScreen = document.getElementById('loading');
    const progressBar = document.getElementById('progress-bar-inner');
    const launchScreen = document.getElementById('launch');
    const errorScreen = document.getElementById('error');
    const errorMessage = document.getElementById('error-message');

    // Fortschrittsbalken steuern
    scaffolding.addEventListener('loadprogress', (progress) => {
      progressBar.style.width = (progress * 100) + '%';
    });

    // Wenn geladen, zeige den Start-Button (Green Flag)
    scaffolding.addEventListener('load', () => {
      loadingScreen.hidden = true;
      launchScreen.hidden = false;
    });

    launchScreen.addEventListener('click', () => {
      launchScreen.hidden = true;
      scaffolding.start();
    });

    // Fehler-Handling
    const handleError = (err) => {
      loadingScreen.hidden = true;
      errorScreen.hidden = false;
      errorMessage.innerText = err.toString();
      console.error(err);
    };

    window.onerror = handleError;

    // Lade die project.json direkt aus deinem Repository
    fetch('./project.json')
      .then(r => {
        if (!r.ok) throw new Error('project.json konnte nicht geladen werden. Prüfe ob die Datei im Repo ist.');
        return r.arrayBuffer();
      })
      .then(data => scaffolding.loadProject(data))
      .catch(handleError);
  </script>

</body>
</html>
